name: Docs

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/docs.yml
      - pyproject.toml
      - s2fft/**
      - docs/**
      - notebooks/**
  push:
    branches:
    - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v6.0.2

    - name: Set up Python 
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"
        cache: pip
        cache-dependency-path: pyproject.toml
    
    - name: Install dependencies
      run: |
        sudo apt install pandoc
        python -m pip install --upgrade pip
        pip install .[docs,examples]
  
    # By default, sphinx-gallery dumps each notebook to
    # docs/_build/html/_downloads/<hash>/<example-name>.ipynb.
    # These links seemingly cannot be accessed when writing the scripts themselves, so the workaround is to
    # - Move the generated notebooks to a more convenient location.
    # - Within the notebooks themselves, hard-code the link to the GH-pages deployment for that notebook.
    # The loop below performs the necessary copying. 
    # The the source files are assumed to have the hard-coded links already set correctly.
    - name: Build documentation
      run: |
        cd docs
        make html
        mkdir _build/html/_colab_notebooks
        for nb in `find _build/html/_downloads -name '*.ipynb'`; do
          cp $nb _build/html/_colab_notebooks/
        done

    - name: Upload built docs as artifact
      id: deployment
      uses: actions/upload-pages-artifact@v4
      with:
        path: docs/_build/html
        retention-days: 30

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
